name: ktlint

on:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    ktlint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            - name: Gradle cache
              uses: gradle/actions/setup-gradle@v3

            - name: Run ktlint
              run: ./gradlew ktlintCheck --no-daemon
